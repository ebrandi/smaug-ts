# =============================================================================
# SMAUG 2.0 TypeScript — Docker Compose (Production)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smaug
      POSTGRES_PASSWORD: smaug
      POSTGRES_DB: smaug
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smaug -d smaug"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # SMAUG 2.0 game server
  # ---------------------------------------------------------------------------
  game:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://smaug:smaug@db:5432/smaug
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: "4000"
      WS_PATH: /ws
      SOCKETIO_PATH: /play
      MAX_CONNECTIONS: "256"
      IDLE_TIMEOUT_SEC: "600"
      LOG_LEVEL: info
      PULSE_INTERVAL_MS: "250"
    ports:
      - "4000:4000"
    volumes:
      - worlddata:/app/world
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
    driver: local
  worlddata:
    driver: local

# =============================================================================
# SMAUG 2.0 TypeScript — Docker Compose Development Override
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  game:
    build:
      target: build
    command: npx tsx watch src/main.ts
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DB_LOG: "true"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:4000"
      - "9229:9229"   # Node.js inspector port
